name: dtaas

services:
  traefik:
    image: traefik:v3.6.4
    restart: unless-stopped
    command:
      - "--log.level=DEBUG"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web-secure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=web-secure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
    # Dashboard is not exposed by default. To expose it securely, uncomment the
    # labels below and set TRAEFIK_DASHBOARD_USERS in config/.env.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.traefik-dashboard.rule=Host(`${SERVER_DNS:-localhost}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
    #   - "traefik.http.routers.traefik-dashboard.entryPoints=web-secure"
    #   - "traefik.http.routers.traefik-dashboard.tls=true"
    #   - "traefik.http.routers.traefik-dashboard.service=api@internal"
    #   - "traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth"
    #   - "traefik.http.middlewares.traefik-dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./dynamic/tls.yml:/etc/traefik/tls.yml"
      - "./certs:/etc/traefik-certs"
    networks:
      frontend:
        aliases:
          - "${SERVER_DNS:-localhost}"
      users:

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command:
      - "start"
      - "--proxy-headers=xforwarded"
      - "--hostname-strict=false"
      - "--http-relative-path=/auth"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME=https://${SERVER_DNS:-localhost}/auth
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/auth
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.entryPoints=web-secure"
      - "traefik.http.routers.keycloak.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - frontend
      - users

  client:
    image: intocps/dtaas-web:latest
    restart: unless-stopped
    volumes:
      - "./config/client.js:/dtaas/client/build/env.js"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.entryPoints=web-secure"
      - "traefik.http.routers.client.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/`)"
      - "traefik.http.routers.client.tls=true"
      # No auth middleware on the client: the DTaaS web app is a public SPA that
      # handles its own OIDC PKCE flow with Keycloak. Oathkeeper protects only
      # the workspace service paths (user1, user2) below.
      - "traefik.http.services.client.loadbalancer.server.port=4000"
    networks:
      - frontend

  user1:
    image: intocps/workspace:latest
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.gnome
    environment:
      - MAIN_USER=${USERNAME1:-user1}
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME1:-user1}:/workspace"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web-secure"
      - "traefik.http.routers.u1.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME1:-user1}`)"
      - "traefik.http.routers.u1.tls=true"
      # Route directly to Oathkeeper proxy — no forwardauth middleware.
      - "traefik.http.routers.u1.service=oathkeeper-proxy@docker"
    networks:
      - users

  user2:
    image: mltooling/ml-workspace-minimal:0.13.2
    restart: unless-stopped
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME2:-user2}:/workspace"
    environment:
      - AUTHENTICATE_VIA_JUPYTER=
      - WORKSPACE_BASE_URL=${USERNAME2:-user2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web-secure"
      - "traefik.http.routers.u2.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME2:-user2}`)"
      - "traefik.http.routers.u2.tls=true"
      # Route directly to Oathkeeper proxy — no forwardauth middleware.
      - "traefik.http.routers.u2.service=oathkeeper-proxy@docker"
    networks:
      - users

  admin:
    image: intocps/workspace:latest
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.gnome
    environment:
      - MAIN_USER=${USERNAME_ADMIN:-sandra}
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME_ADMIN:-sandra}:/workspace"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.entryPoints=web-secure"
      - "traefik.http.routers.admin.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME_ADMIN:-sandra}`)"
      - "traefik.http.routers.admin.tls=true"
      # Route directly to Oathkeeper proxy — no forwardauth middleware.
      - "traefik.http.routers.admin.service=oathkeeper-proxy@docker"
    networks:
      - users

  oathkeeper:
    image: oryd/oathkeeper:v26.2.0
    restart: unless-stopped
    # Proxy port 4455: Traefik routes workspace paths here. Oathkeeper validates
    # the JWT and proxies valid requests to the upstream workspace container.
    # On auth failure it redirects browsers to the login-relay (Keycloak PKCE).
    # Decision API port 4456: kept available for internal use / debugging.
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        sed \
          -e 's|$${KEYCLOAK_JWKS_URL}|'"$$KEYCLOAK_JWKS_URL"'|g' \
          -e 's|$${KEYCLOAK_ISSUER_URL}|'"$$KEYCLOAK_ISSUER_URL"'|g' \
          -e 's|$${KEYCLOAK_TARGET_AUDIENCE}|'"$$KEYCLOAK_TARGET_AUDIENCE"'|g' \
          -e 's|$${LOGIN_RELAY_URL}|'"$$LOGIN_RELAY_URL"'|g' \
          /etc/oathkeeper/config/oathkeeper.yml > /tmp/oathkeeper.yml &&
        sed \
          -e 's|$${USERNAME1}|'"$$USERNAME1"'|g' \
          -e 's|$${USERNAME2}|'"$$USERNAME2"'|g' \
          -e 's|$${USERNAME_ADMIN}|'"$$USERNAME_ADMIN"'|g' \
          /etc/oathkeeper/config/access-rules.yml > /tmp/access-rules.yml &&
        oathkeeper serve -c /tmp/oathkeeper.yml
    volumes:
      - "./oathkeeper:/etc/oathkeeper/config"
    environment:
      - KEYCLOAK_JWKS_URL=http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-dtaas}/protocol/openid-connect/certs
      - KEYCLOAK_ISSUER_URL=https://${SERVER_DNS:-localhost}/auth/realms/${KEYCLOAK_REALM:-dtaas}
      - KEYCLOAK_TARGET_AUDIENCE=${KEYCLOAK_OATHKEEPER_CLIENT_ID:-dtaas-workspace}
      - LOGIN_RELAY_URL=https://${SERVER_DNS:-localhost}/login-relay
      # Username path prefixes — substituted into access-rules.yml per-user upstreams.
      - USERNAME1=${USERNAME1:-user1}
      - USERNAME2=${USERNAME2:-user2}
      - USERNAME_ADMIN=${USERNAME_ADMIN:-sandra}
    labels:
      - "traefik.enable=true"
      # Expose the proxy port as a named Traefik service. User workspace routers
      # reference this service so traffic flows: Traefik → Oathkeeper proxy → backend.
      # No forwardauth middleware — Oathkeeper handles auth inline as a proxy.
      - "traefik.http.services.oathkeeper-proxy.loadbalancer.server.port=4455"
    networks:
      - frontend
      - users
    depends_on:
      keycloak:
        condition: service_healthy

  login-relay:
    build:
      context: ./login-relay
    restart: unless-stopped
    environment:
      # Public Keycloak URL — used to build the browser-facing auth redirect.
      - KEYCLOAK_PUBLIC_URL=https://${SERVER_DNS:-localhost}/auth
      # Internal Keycloak URL — used for server-side token exchange.
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-dtaas}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_OATHKEEPER_CLIENT_ID:-dtaas-workspace}
      - SERVER_DNS=${SERVER_DNS:-localhost}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.login-relay.entryPoints=web-secure"
      - "traefik.http.routers.login-relay.rule=Host(`${SERVER_DNS:-localhost}`) && (PathPrefix(`/login-relay`) || Path(`/logout`))"
      - "traefik.http.routers.login-relay.tls=true"
      - "traefik.http.routers.login-relay.middlewares=login-relay-ratelimit"
      - "traefik.http.services.login-relay.loadbalancer.server.port=8080"
      # Rate limit: max 20 login initiations/minute per IP — prevents abuse of the
      # PKCE flow. No auth middleware — this path must be publicly reachable.
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.period=1m"
    networks:
      - frontend
      - users
    depends_on:
      keycloak:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:1.15.2
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies/policy.rego
    volumes:
      - "./oathkeeper/policy.rego:/policies/policy.rego"
    networks:
      - users


networks:
  frontend:
    name: dtaas-frontend
  users:
    name: dtaas-users
volumes:
  keycloak-data:
    driver: local
# Production-ready Traefik configuration with TLS/HTTPS for
# secure deployments of the DTAAS workspace.
# This configuration is intended for production use with TLS/HTTPS.
# For development/testing, use compose.traefik.secure.yml instead.

name: dtaas

services:
  traefik:
    image: traefik:v3.6.4
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web-secure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=web-secure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./dynamic/tls.yml:/etc/traefik/tls.yml"
      - "./certs:/etc/traefik-certs"
    networks:
      frontend:
        aliases:
          - "${SERVER_DNS}"  # Allows other containers on this network to reach Traefik via the public domain name
      users:

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command:
      - "start"
      - "--proxy-headers=xforwarded"
      - "--hostname-strict=false"
      - "--http-relative-path=/auth"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD?KEYCLOAK_ADMIN_PASSWORD_not_set}
      - KC_HOSTNAME=https://${SERVER_DNS}/auth
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true  # HTTP connection from Traefik (HTTPS is terminated at Traefik)
      - KC_HTTP_RELATIVE_PATH=/auth
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.entryPoints=web-secure"
      - "traefik.http.routers.keycloak.rule=Host(`${SERVER_DNS}`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - frontend
      - users

  client:
    image: intocps/dtaas-web:latest
    restart: unless-stopped
    volumes:
      - "./config/client.js:/dtaas/client/build/env.js"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.entryPoints=web-secure"
      - "traefik.http.routers.client.rule=Host(`${SERVER_DNS}`) && PathPrefix(`/`)"
      - "traefik.http.routers.client.tls=true"
      # Explicit port so Traefik can register this container and create the router.
      # Without this, containers with no EXPOSE directive are silently skipped and
      # all their labels (including the router rule) are ignored.
      - "traefik.http.services.client.loadbalancer.server.port=4000"
      # Route through Oathkeeper proxy — the dtaas-spa-gateway access rule requires
      # an active dtaas-workspace token (cookie: dtaas_access_token), validated via
      # Keycloak introspection, before the SPA is shown.
      # Unauthenticated requests are redirected to the login-relay → Keycloak login.
      - "traefik.http.routers.client.service=oathkeeper-proxy@docker"
    networks:
      - frontend
      - users

  user1:
    image: workspace:latest
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.gnome
    environment:
      - MAIN_USER=${USERNAME1:-user1}
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME1:-user1}:/workspace"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web-secure"
      - "traefik.http.routers.u1.rule=Host(`${SERVER_DNS}`) && PathPrefix(`/${USERNAME1:-user1}`)"
      - "traefik.http.routers.u1.tls=true"
      # Route directly to Oathkeeper proxy — no forwardauth middleware.
      - "traefik.http.routers.u1.service=oathkeeper-proxy@docker"
    networks:
      - users

  user2:
    image: mltooling/ml-workspace-minimal:0.13.2
    restart: unless-stopped
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME2:-user2}:/workspace"
    environment:
      - AUTHENTICATE_VIA_JUPYTER=
      - WORKSPACE_BASE_URL=${USERNAME2:-user2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web-secure"
      - "traefik.http.routers.u2.rule=Host(`${SERVER_DNS}`) && PathPrefix(`/${USERNAME2:-user2}`)"
      - "traefik.http.routers.u2.tls=true"
      # Route directly to Oathkeeper proxy — no forwardauth middleware.
      - "traefik.http.routers.u2.service=oathkeeper-proxy@docker"
    networks:
      - users

  oathkeeper:
    image: oryd/oathkeeper:v26.2.0
    restart: unless-stopped
    # Proxy port 4455: Traefik routes workspace paths here. Oathkeeper validates
    # tokens via Keycloak introspection and proxies valid requests to the upstream
    # workspace container.
    # On auth failure it redirects browsers to the login-relay (Keycloak PKCE).
    # Decision API port 4456: kept available for internal use / debugging.
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        KEYCLOAK_INTROSPECTION_BASIC_AUTH=$(printf '%s:%s' "$$KEYCLOAK_CLIENT_ID" "$$KEYCLOAK_CLIENT_SECRET" | base64 | tr -d '\n') &&
        sed \
          -e 's|$${KEYCLOAK_INTROSPECTION_URL}|'"$$KEYCLOAK_INTROSPECTION_URL"'|g' \
          -e 's|$${KEYCLOAK_INTROSPECTION_BASIC_AUTH}|'"$$KEYCLOAK_INTROSPECTION_BASIC_AUTH"'|g' \
          -e 's|$${LOGIN_RELAY_URL}|'"$$LOGIN_RELAY_URL"'|g' \
          /etc/oathkeeper/config/oathkeeper.yml > /tmp/oathkeeper.yml &&
        sed \
          -e 's|$${USERNAME1}|'"$$USERNAME1"'|g' \
          -e 's|$${USERNAME2}|'"$$USERNAME2"'|g' \
          /etc/oathkeeper/config/access-rules.yml > /tmp/access-rules.yml &&
        oathkeeper serve -c /tmp/oathkeeper.yml
    volumes:
      # Provides oathkeeper.yml and access-rules.yml to the container.
      - "./oathkeeper:/etc/oathkeeper/config"
    environment:
      # Keycloak token introspection — validates tokens and checks active status.
      # KEYCLOAK_CLIENT_ID and KEYCLOAK_CLIENT_SECRET are used to compute the
      # HTTP Basic auth credential for the introspection endpoint at startup.
      - KEYCLOAK_INTROSPECTION_URL=http://keycloak:8080/auth/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token/introspect
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - LOGIN_RELAY_URL=https://${SERVER_DNS:-localhost}/login-relay
      # Username path prefixes — substituted into access-rules.yml per-user upstreams.
      - USERNAME1=${USERNAME1:-user1}
      - USERNAME2=${USERNAME2:-user2}
    labels:
      - "traefik.enable=true"
      # Expose the proxy port as a named Traefik service. User workspace routers
      # reference this service so traffic flows: Traefik → Oathkeeper proxy → backend.
      # No forwardauth middleware — Oathkeeper handles auth inline as a proxy.
      - "traefik.http.services.oathkeeper-proxy.loadbalancer.server.port=4455"
    networks:
      - frontend
      - users
    depends_on:
      keycloak:
        condition: service_healthy

  login-relay:
    build:
      context: ./login-relay
    restart: unless-stopped
    environment:
      # Public Keycloak URL — used to build the browser-facing auth redirect.
      - KEYCLOAK_PUBLIC_URL=https://${SERVER_DNS:-localhost}/auth
      # Internal Keycloak URL — used for server-side token exchange.
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - SERVER_DNS=${SERVER_DNS}
      # Workspace prefixes — used to detect unknown paths and avoid redirect loops.
      - USERNAME1=${USERNAME1:-user1}
      - USERNAME2=${USERNAME2:-user2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.login-relay.entryPoints=web-secure"
      - "traefik.http.routers.login-relay.rule=Host(`${SERVER_DNS}`) && (PathPrefix(`/login-relay`) || Path(`/logout`))"
      - "traefik.http.routers.login-relay.tls=true"
      - "traefik.http.routers.login-relay.middlewares=login-relay-ratelimit"
      - "traefik.http.services.login-relay.loadbalancer.server.port=8080"
      # Rate limit: max 20 login initiations/minute per IP — prevents abuse of the
      # PKCE flow. No auth middleware — this path must be publicly reachable.
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.period=1m"
    networks:
      - frontend
      - users
    depends_on:
      keycloak:
        condition: service_healthy

networks:
  frontend:
    name: dtaas-frontend
  users:
    name: dtaas-users
volumes:
  keycloak-data:
    driver: local

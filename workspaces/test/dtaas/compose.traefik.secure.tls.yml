services:
  traefik:
    image: traefik:v3.6.4
    restart: unless-stopped
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web-secure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=web-secure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./dynamic/tls.yml:/etc/traefik/tls.yml"
      - "./certs:/etc/traefik-certs"
    networks:
      frontend:
        aliases:
          - "${SERVER_DNS:-localhost}"
      users:

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command:
      - "start"
      - "--proxy-headers=xforwarded"
      - "--hostname-strict=false"
      - "--http-relative-path=/auth"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME=https://${SERVER_DNS:-localhost}/auth
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/auth
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.entryPoints=web-secure"
      - "traefik.http.routers.keycloak.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - frontend
      - users

  client:
    image: intocps/dtaas-web:latest
    restart: unless-stopped
    volumes:
      - "./config/client.js:/dtaas/client/build/env.js"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.entryPoints=web-secure"
      - "traefik.http.routers.client.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/`)"
      - "traefik.http.routers.client.tls=true"
      # No auth middleware on the client: the DTaaS web app is a public SPA that
      # handles its own OIDC PKCE flow with Keycloak. Oathkeeper protects only
      # the workspace service paths (user1, user2) below.
      - "traefik.http.services.client.loadbalancer.server.port=4000"
    networks:
      - frontend

  user1:
    image: intocps/workspace:latest
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.gnome
    environment:
      - MAIN_USER=${USERNAME1:-user1}
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME1:-user1}:/workspace"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web-secure"
      - "traefik.http.routers.u1.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME1:-user1}`)"
      - "traefik.http.routers.u1.tls=true"
      - "traefik.http.routers.u1.middlewares=oathkeeper-auth"
    networks:
      - users

  user2:
    image: mltooling/ml-workspace-minimal:0.13.2
    restart: unless-stopped
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME2:-user2}:/workspace"
    environment:
      - AUTHENTICATE_VIA_JUPYTER=
      - WORKSPACE_BASE_URL=${USERNAME2:-user2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web-secure"
      - "traefik.http.routers.u2.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME2:-user2}`)"
      - "traefik.http.routers.u2.tls=true"
      - "traefik.http.routers.u2.middlewares=oathkeeper-auth"
    networks:
      - users


  oathkeeper:
    image: oryd/oathkeeper:v0.40.8
    restart: unless-stopped
    # Serve both the proxy (4455) and the decision API (4456).
    # Traefik ForwardAuth calls the decision API at http://oathkeeper:4456/decisions.
    command: serve -c /etc/oathkeeper/config/oathkeeper.yml
    volumes:
      - "./config/oathkeeper:/etc/oathkeeper/config"
    environment:
      # Internal Keycloak JWKS URL (container-to-container, always HTTP).
      # Oathkeeper fetches public signing keys here to verify JWT signatures.
      - KEYCLOAK_JWKS_URL=http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-dtaas}/protocol/openid-connect/certs
      # Public Keycloak issuer URL. Must match exactly the 'iss' claim in JWTs.
      # In TLS mode, Keycloak sets KC_HOSTNAME to https://<SERVER_DNS>/auth,
      # so the issuer in issued tokens is https://<SERVER_DNS>/auth/realms/<realm>.
      - KEYCLOAK_ISSUER_URL=https://${SERVER_DNS:-localhost}/auth/realms/${KEYCLOAK_REALM:-dtaas}
      # Required audience ('aud' claim) in JWT access tokens.
      - KEYCLOAK_TARGET_AUDIENCE=${KEYCLOAK_CLIENT_ID:-dtaas-workspace}
    labels:
      - "traefik.enable=true"
      # Define the ForwardAuth middleware. Traefik sends workspace requests here
      # for JWT validation before forwarding to the workspace service.
      - "traefik.http.middlewares.oathkeeper-auth.forwardauth.address=http://oathkeeper:4456/decisions"
      # Forward authenticated user identity headers from Oathkeeper to upstream services.
      - "traefik.http.middlewares.oathkeeper-auth.forwardauth.authResponseHeaders=X-User-Name,X-User-Subject"
      # Forward the Authorization header (Bearer token) from the client to Oathkeeper.
      - "traefik.http.middlewares.oathkeeper-auth.forwardauth.authRequestHeaders=Authorization"
    networks:
      - frontend
      - users
    depends_on:
      keycloak:
        condition: service_healthy
      opa:
        condition: service_started

  opa:
    image: openpolicyagent/opa:0.70.0
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies/policy.rego
    volumes:
      - "./config/oathkeeper/policy.rego:/policies/policy.rego"
    networks:
      - users

networks:
  frontend:
    name: dtaas-frontend
  users:
    name: dtaas-users
volumes:
  keycloak-data:
    driver: local
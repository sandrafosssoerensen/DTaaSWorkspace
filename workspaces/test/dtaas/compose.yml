# ⚠️ DEVELOPMENT ONLY - INSECURE CONFIGURATION ⚠️
# This configuration runs single-user workspace in HTTP mode for development/testing.
# For production deployments with TLS/HTTPS, use compose.traefik.secure.tls.yml instead.

services:
  workspace:
    image: workspace:latest
    container_name: workspace
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.xfce
    environment:
      - MAIN_USER=${USERNAME1:-user1}
    ports:
      - "80:8080"
    shm_size: 512m
    volumes:
      - ./files/${USERNAME1:-user1}:/workspace
      - ./files/common:/workspace/common
    develop:
      watch:
        - path: .
          action: rebuild

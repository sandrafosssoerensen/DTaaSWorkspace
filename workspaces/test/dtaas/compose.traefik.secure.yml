# ⚠️ DEVELOPMENT ONLY - INSECURE CONFIGURATION ⚠️
# This configuration uses Traefik for multi-user scenario. Oathkeeper + OPA are used for authorization.
# This configuration uses HTTP (not HTTPS) and insecure flags for development/testing.
# For production deployments with TLS/HTTPS, use compose.traefik.secure.tls.yml instead.

name: dtaas

services:
  traefik:
    image: traefik:v3.6.4
    restart: unless-stopped
    command:
      - "--api.insecure=true"  # DEV ONLY - disable in production
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.insecure=true"  # DEV ONLY
      - "--entrypoints.web.proxyProtocol.insecure=true"  # DEV ONLY
      - "--log.level=DEBUG"  # DEV ONLY - use INFO/WARN in production
    labels:
      - "traefik.http.middlewares.cors.headers.accessControlAllowOriginList=http://localhost,http://host.docker.internal"
      - "traefik.http.middlewares.cors.headers.accessControlAllowMethods=GET,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.routers.myservice.rule=Host(`myservice.localhost`)"
      - "traefik.http.services.myservice.loadbalancer.server.port=80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frontend
      - users

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command:
      - "start-dev"  # DEV ONLY - use 'start' with proper config in production
      - "--http-relative-path=/auth"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME=http://${SERVER_DNS:-localhost}/auth
      - KC_HTTP_ENABLED=true  # HTTP connection from Traefik (HTTPS is terminated at Traefik)
      - KC_PROXY_HEADERS=xforwarded  # Enable proxy headers for Traefik
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.entryPoints=web"
      - "traefik.http.routers.keycloak.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/auth`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - frontend
      - users

  oathkeeper:
    image: oryd/oathkeeper:v26.2.0
    restart: unless-stopped
    # Serve both the proxy (4455) and the decision API (4456).
    # Traefik ForwardAuth calls the decision API at http://oathkeeper:4456/decisions.
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        sed \
          -e 's|$${KEYCLOAK_JWKS_URL}|'"$$KEYCLOAK_JWKS_URL"'|g' \
          -e 's|$${KEYCLOAK_ISSUER_URL}|'"$$KEYCLOAK_ISSUER_URL"'|g' \
          -e 's|$${KEYCLOAK_TARGET_AUDIENCE}|'"$$KEYCLOAK_TARGET_AUDIENCE"'|g' \
          /etc/oathkeeper/config/oathkeeper.yml > /tmp/oathkeeper.yml &&
        sed \
          -e 's|$${KEYCLOAK_JWKS_URL}|'"$$KEYCLOAK_JWKS_URL"'|g' \
          -e 's|$${KEYCLOAK_ISSUER_URL}|'"$$KEYCLOAK_ISSUER_URL"'|g' \
          -e 's|$${KEYCLOAK_TARGET_AUDIENCE}|'"$$KEYCLOAK_TARGET_AUDIENCE"'|g' \
          /etc/oathkeeper/config/access-rules.yml > /tmp/access-rules.yml &&
        oathkeeper serve -c /tmp/oathkeeper.yml
    volumes:
      - ./oathkeeper:/etc/oathkeeper/config
    environment:
      # Keycloak JWKS URL for JWT signature verification.
      # Defaults to the internal container URL for embedded Keycloak deployments.
      # Override in .env with the public HTTPS URL when using an external Keycloak.
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-dtaas}/protocol/openid-connect/certs}
      # Public Keycloak issuer URL. Must match exactly the 'iss' claim in JWTs.
      # Read from .env so it works for both embedded HTTP Keycloak and external
      # HTTPS Keycloak (the hardcoded http:// would mismatch an https:// issuer).
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-http://localhost/auth/realms/dtaas}
      # Required audience ('aud' claim) in JWT access tokens.
      - KEYCLOAK_TARGET_AUDIENCE=${KEYCLOAK_CLIENT_ID:-dtaas-client}
    labels:
      - "traefik.enable=true"
      # Define the ForwardAuth middleware. Traefik sends workspace requests here
      # for JWT validation before forwarding to the workspace service.
      - "traefik.http.middlewares.oathkeeper-auth.forwardauth.address=http://oathkeeper:4456/decisions"
      # Forward authenticated user identity headers from Oathkeeper to upstream services.
      - "traefik.http.middlewares.oathkeeper-auth.forwardauth.authResponseHeaders=X-User-Name,X-User-Subject,X-User-Groups"
      # Forward the Authorization header and Cookie so Oathkeeper can validate
      # both Bearer tokens (programmatic fetch) and the dtaas_access_token cookie
      # (browser-navigation workspace requests).
      - "traefik.http.middlewares.oathkeeper-auth.forwardauth.authRequestHeaders=Authorization,Cookie"
    networks:
      - frontend
      - users
    depends_on:
      keycloak:
        condition: service_healthy
      opa-proxy:
        condition: service_started

  opa:
    image: openpolicyagent/opa:1.15.2
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies/policy.rego
    volumes:
      - ./oathkeeper/policy.rego:/policies/policy.rego
    networks:
      - users

  opa-proxy:
    # Nginx adapter: converts OPA's 404 deny response to 403 so Oathkeeper's
    # remote_json authorizer returns a proper 403 Forbidden (not 500) to clients.
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./oathkeeper/opa-proxy.nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - users
    depends_on:
      - opa

  client:
    image: intocps/dtaas-web:new-workspace
    restart: unless-stopped
    volumes:
      - ./config/client.js:/dtaas/client/build/env.js
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.entryPoints=web"
      - "traefik.http.services.client.loadbalancer.server.port=4000"
      # No auth middleware on the client: the DTaaS web app is a public SPA that
      # handles its own OIDC PKCE flow with Keycloak. Oathkeeper protects only
      # the workspace service paths (user1, user2) below.
      - "traefik.http.routers.client.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/`)"
    networks:
      - frontend

  user1:
    image: intocps/workspace:latest
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.gnome
    environment:
      - MAIN_USER=${USERNAME1:-user1}
    volumes:
      - ./files/user1:/workspace
      - ./files/common:/workspace/common
    shm_size: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web"
      - "traefik.http.routers.u1.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME1:-user1}`)"
      - "traefik.http.routers.u1.middlewares=oathkeeper-auth"
    networks:
      - users

  user2:
    image: mltooling/ml-workspace-minimal:0.13.2
    restart: unless-stopped
    environment:
      - AUTHENTICATE_VIA_JUPYTER=
      - WORKSPACE_BASE_URL=${USERNAME2:-user2}
    volumes:
      - ./files/user2:/workspace
      - ./files/common:/workspace/common
    shm_size: "512m"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web"
      - "traefik.http.routers.u2.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME2:-user2}`)"
      - "traefik.http.routers.u2.middlewares=oathkeeper-auth"
    networks:
      - users

  admin:
    image: intocps/workspace:latest
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: Dockerfile.ubuntu.noble.gnome
    environment:
      - MAIN_USER=${USERNAME_ADMIN:-sandra}
    volumes:
      - ./files/${USERNAME_ADMIN:-sandra}:/workspace
      - ./files/common:/workspace/common
    shm_size: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.entryPoints=web"
      - "traefik.http.routers.admin.rule=Host(`${SERVER_DNS:-localhost}`) && PathPrefix(`/${USERNAME_ADMIN:-sandra}`)"
      - "traefik.http.routers.admin.middlewares=oathkeeper-auth"
    networks:
      - users

networks:
  frontend:
    name: dtaas-frontend
  users:
    name: dtaas-users
volumes:
  keycloak-data:
    driver: local
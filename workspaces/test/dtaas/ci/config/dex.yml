# Dex OIDC configuration for CI testing.
#
# This file configures a minimal in-memory Dex instance used exclusively in
# GitHub Actions.  It is NOT suitable for production use – credentials are
# hardcoded and storage is ephemeral (in-memory).
#
# Registered client:
#   ID:     traefik-forward-auth
#   Secret: ci-test-client-secret
#
# Test users:
#   user1@localhost / password
#   user2@localhost / password

issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  # Skip the "Grant access" screen so the automated curl/Python flow works
  # without any human interaction.
  skipApprovalScreen: true

staticClients:
  - id: traefik-forward-auth
    secret: ci-test-client-secret
    name: Traefik Forward Auth
    redirectURIs:
      - http://localhost/_oauth
      - https://localhost/_oauth

enablePasswordDB: true

staticPasswords:
  - email: user1@localhost
    # bcrypt hash of "password"
    hash: "$2b$10$aeXAG8qEBbRVmc3LwZtu5O.TRI5Hot6ra.NigiinvmOWyVXhOkZs."
    username: user1
    userID: "1111-1111-1111-1111"
  - email: user2@localhost
    hash: "$2b$10$aeXAG8qEBbRVmc3LwZtu5O.TRI5Hot6ra.NigiinvmOWyVXhOkZs."
    username: user2
    userID: "2222-2222-2222-2222"

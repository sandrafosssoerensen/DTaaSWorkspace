# Self-contained CI compose for testing Oathkeeper + login-relay auth over HTTPS.
#
# Intended ONLY for GitHub Actions – do NOT use in production.
#
# Replaces traefik-forward-auth with the production Oathkeeper + login-relay
# architecture so CI tests the same auth flow used in production.
# Dex is used as a lightweight OIDC provider instead of Keycloak.
# login-relay is configured via OIDC_* overrides to point at Dex's endpoints.
#
# Prerequisites (handled automatically by the CI workflow):
#   1. Generate mkcert certificates in workspaces/test/dtaas/ci/certs/
#        fullchain.pem  (certificate)
#        privkey.pem    (private key)
#   2. Build the workspace image:
#        docker build -t workspace:latest -f Dockerfile .
#
# Usage:
#   docker compose -f workspaces/test/dtaas/ci/compose.traefik.secure.tls.yml up -d
#
# The CI runner must add "127.0.0.1 dex" to /etc/hosts so that Dex redirect
# URIs (http://dex:5556/...) resolve correctly from the host.

name: workspace-ci-tls

services:

  # ── Dex OIDC provider ──────────────────────────────────────────────────────
  dex:
    image: dexidp/dex:v2.41.1
    restart: unless-stopped
    command: ["dex", "serve", "/etc/dex/config.yml"]
    volumes:
      - ./config/dex.yml:/etc/dex/config.yml:ro
    ports:
      - "5556:5556"
    networks:
      - frontend
      - users

  # ── Traefik reverse proxy (HTTP → HTTPS redirect + TLS termination) ────────
  traefik:
    image: traefik:v3.6.4
    restart: unless-stopped
    command:
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web-secure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=web-secure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic/tls.yml:/etc/traefik/tls.yml:ro
      - ./certs:/etc/traefik-certs:ro
    networks:
      - frontend
      - users

  # ── Oathkeeper (token validation proxy) ───────────────────────────────────
  # Validates dtaas_access_token cookies via Dex's introspection endpoint and
  # proxies authenticated requests to the upstream workspace containers.
  oathkeeper:
    image: oryd/oathkeeper:v26.2.0
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        KEYCLOAK_INTROSPECTION_BASIC_AUTH=$(printf '%s:%s' "$$KEYCLOAK_CLIENT_ID" "$$KEYCLOAK_CLIENT_SECRET" | base64 | tr -d '\n') &&
        sed \
          -e 's|$${KEYCLOAK_INTROSPECTION_URL}|'"$$KEYCLOAK_INTROSPECTION_URL"'|g' \
          -e 's|$${KEYCLOAK_INTROSPECTION_BASIC_AUTH}|'"$$KEYCLOAK_INTROSPECTION_BASIC_AUTH"'|g' \
          -e 's|$${LOGIN_RELAY_URL}|'"$$LOGIN_RELAY_URL"'|g' \
          /etc/oathkeeper/config/oathkeeper.yml > /tmp/oathkeeper.yml &&
        cp /etc/oathkeeper/rules/access-rules.yml /tmp/access-rules.yml &&
        oathkeeper serve -c /tmp/oathkeeper.yml
    volumes:
      - "../oathkeeper:/etc/oathkeeper/config"
      - "./oathkeeper:/etc/oathkeeper/rules"
    environment:
      - KEYCLOAK_INTROSPECTION_URL=http://dex:5556/dex/token/introspect
      - KEYCLOAK_CLIENT_ID=dtaas-workspace
      - KEYCLOAK_CLIENT_SECRET=ci-workspace-secret
      - LOGIN_RELAY_URL=https://localhost/login-relay
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.oathkeeper-proxy.loadbalancer.server.port=4455"
    networks:
      - frontend
      - users
    depends_on:
      - dex

  # ── login-relay (Keycloak auth code relay, configured for Dex in CI) ───────
  login-relay:
    build:
      context: ../login-relay
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - SERVER_DNS=localhost
      - KEYCLOAK_CLIENT_ID=dtaas-workspace
      - KEYCLOAK_CLIENT_SECRET=ci-workspace-secret
      # Placeholder values — unused when OIDC_* overrides below are set,
      # but KEYCLOAK_PUBLIC_URL and KEYCLOAK_REALM are required env vars.
      - KEYCLOAK_PUBLIC_URL=http://dex:5556
      - KEYCLOAK_INTERNAL_URL=http://dex:5556
      - KEYCLOAK_REALM=dex
      # Dex endpoint overrides (replace Keycloak-derived URLs).
      - OIDC_AUTH_URL_PUBLIC=http://dex:5556/dex/auth
      - OIDC_TOKEN_URL_INTERNAL=http://dex:5556/dex/token
      - OIDC_JWKS_URL_INTERNAL=http://dex:5556/dex/keys
      - OIDC_ISSUER=http://dex:5556/dex
      - WORKSPACE_USERS=user1,user2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.login-relay.entryPoints=web-secure"
      - "traefik.http.routers.login-relay.rule=Host(`localhost`) && (PathPrefix(`/login-relay`) || Path(`/logout`))"
      - "traefik.http.routers.login-relay.tls=true"
      - "traefik.http.routers.login-relay.middlewares=login-relay-ratelimit"
      - "traefik.http.services.login-relay.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.login-relay-ratelimit.ratelimit.period=1m"
    networks:
      - frontend
      - users
    depends_on:
      - dex

  # ── user1 workspace ────────────────────────────────────────────────────────
  user1:
    image: workspace:latest
    restart: unless-stopped
    environment:
      - MAIN_USER=user1
    volumes:
      - ./files/user1:/workspace
      - ./files/common:/workspace/common
    shm_size: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web-secure"
      - "traefik.http.routers.u1.rule=Host(`localhost`) && PathPrefix(`/user1`)"
      - "traefik.http.routers.u1.tls=true"
      - "traefik.http.routers.u1.service=oathkeeper-proxy@docker"
    networks:
      - users

  # ── user2 workspace ────────────────────────────────────────────────────────
  user2:
    image: mltooling/ml-workspace-minimal:0.13.2
    restart: unless-stopped
    environment:
      - AUTHENTICATE_VIA_JUPYTER=
      - WORKSPACE_BASE_URL=user2
    volumes:
      - ./files/user2:/workspace
      - ./files/common:/workspace/common
    shm_size: "512m"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web-secure"
      - "traefik.http.routers.u2.rule=Host(`localhost`) && PathPrefix(`/user2`)"
      - "traefik.http.routers.u2.tls=true"
      - "traefik.http.routers.u2.service=oathkeeper-proxy@docker"
    networks:
      - users

networks:
  frontend:
    name: dtaas-ci-tls-frontend
  users:
    name: dtaas-ci-tls-users

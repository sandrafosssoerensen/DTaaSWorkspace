# Self-contained CI compose for testing Traefik OAuth2 authorization over HTTPS.
#
# Intended ONLY for GitHub Actions – do NOT use in production.
#
# Prerequisites (handled automatically by the CI workflow):
#   1. Generate mkcert certificates in workspaces/test/dtaas/ci/certs/
#        fullchain.pem  (certificate)
#        privkey.pem    (private key)
#        rootCA.crt     (mkcert root CA, used to build the forward-auth image)
#   2. Build the CA-aware traefik-forward-auth image:
#        docker build -t traefik-forward-auth-local:latest \
#            workspaces/test/dtaas/ci/certs/
#
# Usage:
#   docker compose -f workspaces/test/dtaas/ci/compose.traefik.secure.tls.yml up -d
#
# The CI runner must add "127.0.0.1 dex" to /etc/hosts so that the OAuth
# redirect from traefik-forward-auth (pointing at http://dex:5556/...) can be
# followed by curl/Python running on the host.

name: workspace-ci-tls

services:

  # ── Dex OIDC provider ──────────────────────────────────────────────────────
  # Dex itself runs over plain HTTP on port 5556.  The redirect URI it issues
  # back to the browser is https://localhost/_oauth (registered in dex.yml).
  dex:
    image: dexidp/dex:v2.41.1
    restart: unless-stopped
    command: ["dex", "serve", "/etc/dex/config.yml"]
    volumes:
      - ./config/dex.yml:/etc/dex/config.yml:ro
    ports:
      - "5556:5556"
    networks:
      - frontend
      - users

  # ── Traefik reverse proxy (HTTP → HTTPS redirect + TLS termination) ────────
  traefik:
    image: traefik:v3.6.4
    restart: unless-stopped
    command:
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web-secure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=web-secure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic/tls.yml:/etc/traefik/tls.yml:ro
      - ./certs:/etc/traefik-certs:ro
    networks:
      - frontend
      - users

  # ── traefik-forward-auth (OIDC via Dex, CA-aware image) ───────────────────
  # Uses a custom image that embeds the mkcert root CA so that HTTPS redirects
  # through localhost are validated instead of rejected.
  traefik-forward-auth:
    image: traefik-forward-auth-local:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=trace
      - DEFAULT_PROVIDER=oidc
      # Internal Docker network URL for the OIDC discovery document fetch.
      - PROVIDERS_OIDC_ISSUER_URL=http://dex:5556/dex
      - PROVIDERS_OIDC_CLIENT_ID=traefik-forward-auth
      - PROVIDERS_OIDC_CLIENT_SECRET=ci-test-client-secret
      - SECRET=ci-test-hmac-secret-at-least-32-chars!!
      # No INSECURE_COOKIE – cookies must be Secure over HTTPS.
      - CONFIG=/conf
      - AUTH_HOST=localhost
      - COOKIE_DOMAIN=localhost
    volumes:
      - ./config/conf:/conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redirect.entryPoints=web-secure"
      - "traefik.http.routers.redirect.rule=Host(`localhost`) && PathPrefix(`/_oauth`)"
      - "traefik.http.routers.redirect.tls=true"
      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.address=http://traefik-forward-auth:4181"
      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.authResponseHeaders=X-Forwarded-User"
      - "traefik.http.services.traefik-forward-auth.loadbalancer.server.port=4181"
    depends_on:
      - dex
    networks:
      - frontend
      - users

  # ── user1 workspace ────────────────────────────────────────────────────────
  user1:
    image: workspace:latest
    restart: unless-stopped
    environment:
      - MAIN_USER=user1
    volumes:
      - ./files/user1:/workspace
      - ./files/common:/workspace/common
    shm_size: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web-secure"
      - "traefik.http.routers.u1.rule=Host(`localhost`) && PathPrefix(`/user1`)"
      - "traefik.http.routers.u1.tls=true"
      - "traefik.http.routers.u1.middlewares=traefik-forward-auth"
    networks:
      - users

  # ── user2 workspace ────────────────────────────────────────────────────────
  user2:
    image: mltooling/ml-workspace-minimal:0.13.2
    restart: unless-stopped
    environment:
      - AUTHENTICATE_VIA_JUPYTER=
      - WORKSPACE_BASE_URL=user2
    volumes:
      - ./files/user2:/workspace
      - ./files/common:/workspace/common
    shm_size: "512m"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web-secure"
      - "traefik.http.routers.u2.rule=Host(`localhost`) && PathPrefix(`/user2`)"
      - "traefik.http.routers.u2.tls=true"
      - "traefik.http.routers.u2.middlewares=traefik-forward-auth"
    networks:
      - users

networks:
  frontend:
    name: dtaas-ci-tls-frontend
  users:
    name: dtaas-ci-tls-users

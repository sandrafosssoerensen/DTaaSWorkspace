# DTaaS Oathkeeper access rules.
# Oathkeeper is responsible for JWT validation only (authentication).
# Authorization (RBAC) is handled by OPA, linked to the workspace nginx —
# Oathkeeper and OPA are decoupled.

# Rule 1: Health check — no authentication required.
- id: dtaas-public-health
  version: "v0.36.0-beta.1"
  description: >
    Allow unauthenticated GET/HEAD access to health-check endpoints.
  match:
    url: "<^/health.*$>"
    methods:
      - GET
      - HEAD
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Rule 2: Workspace user paths — require valid Keycloak JWT.
# Oathkeeper validates the JWT signature, issuer, audience, and expiry.
# Fine-grained RBAC (which user can access which workspace) is enforced
# separately by OPA via the workspace nginx.
- id: dtaas-workspace-jwt-enforcement
  version: "v0.36.0-beta.1"
  description: >
    Requires a valid Keycloak-issued JWT. Oathkeeper validates the token
    and injects user identity headers. RBAC is handled downstream by OPA.
  match:
    url: "<.*>"
    methods:
      - GET
      - HEAD
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
  authenticators:
    - handler: jwt
  authorizer:
    handler: allow
  mutators:
    - handler: header

# DTaaS Oathkeeper access rules.
# Oathkeeper is responsible for JWT validation only (authentication).
# Authorization (RBAC) is handled by OPA, linked to the workspace nginx —
# Oathkeeper and OPA are decoupled.

# Rule 1: Health check — no authentication required.
- id: dtaas-public-health
  version: "v0.36.0-beta.1"
  description: >
    Allow unauthenticated GET/HEAD access to health-check endpoints.
  match:
    url: "<^https?://[^/]*/health.*$>"
    methods:
      - GET
      - HEAD
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Rule 2: Login-relay and logout — no authentication required.
# The login-relay initiates the Keycloak PKCE flow for unauthenticated browsers
# redirected here by Oathkeeper's redirect error handler. /logout is a public
# alias for /login-relay/logout — must be reachable without a valid token.
- id: dtaas-login-relay-public
  version: "v0.36.0-beta.1"
  description: >
    Allow unauthenticated GET access to the login-relay and /logout.
  match:
    url: "<^https?://[^/]*/(login-relay.*|logout)$>"
    methods:
      - GET
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Rule 3: user1 workspace — require valid Keycloak JWT, proxy to user1 container.
- id: dtaas-user1-workspace
  version: "v0.36.0-beta.1"
  description: >
    Requires a valid Keycloak JWT. Proxies to the user1 workspace container.
  match:
    url: "<^https?://[^/]*/${USERNAME1}(/.*)?$>"
    methods:
      - GET
      - HEAD
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
  upstream:
    url: http://user1:8080
  authenticators:
    - handler: jwt
      config:
        token_from:
          header: Authorization
    - handler: jwt
      config:
        token_from:
          cookie: dtaas_access_token
  authorizer:
    handler: allow
  mutators:
    - handler: header


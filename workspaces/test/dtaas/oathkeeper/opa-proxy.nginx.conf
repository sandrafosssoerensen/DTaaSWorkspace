# Nginx adapter between Oathkeeper and OPA.
#
# Oathkeeper's remote_json authorizer returns HTTP 403 to the client when the
# remote endpoint returns 403, but returns HTTP 500 (plain error) when the
# remote returns any other non-200 code — including the 404 that OPA's v0 API
# emits for undefined (deny) decisions.
#
# This adapter proxies all requests to OPA and converts OPA's 404 deny response
# to 403, so Oathkeeper follows the ErrForbidden path and returns a proper 403.

events {
    worker_connections 64;
}

http {
    access_log off;

    server {
        listen 8080;

        location / {
            proxy_pass         http://opa:8181;
            proxy_set_header   Host opa:8181;
            proxy_read_timeout 5s;

            # Intercept OPA's 404 (undefined/deny in v0 API) and convert to 403.
            # Oathkeeper's remote_json returns ErrForbidden (HTTP 403) only when
            # the remote endpoint itself returns 403 — any other non-200 becomes 500.
            proxy_intercept_errors on;
            error_page 404 = @forbidden;
        }

        location @forbidden {
            return 403;
        }
    }
}

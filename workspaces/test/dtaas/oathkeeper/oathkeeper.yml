# ORY Oathkeeper configuration for DTaaS workspace authentication.
# 
# Authentication:
#   oauth2_introspection: Validates the dtaas_access_token cookie against
#   Keycloak's introspection endpoint. Returns 401 if token is expired/revoked.
#
# Authorization:
#   remote_json: Calls login-relay /authz/workspace/<user> server-to-server.
#   Checks two things:
#     1. preferred_username from introspection must match the URL path prefix.
#     2. JTI (JWT ID) from introspection must match the JTI stored in login-relay's
#        server-side session store (_session_jti_store). If Keycloak issued a new
#        token (JTI changed) the authorizer returns 401 → forced re-login.
#
# Session lifecycle:
#   - Browser authenticates via PKCE; login-relay stores (username → JTI) in memory
#   - On every workspace request, remote_json compares current JTI vs stored JTI
#   - If JTI changes → new token was issued outside this session → 401 → re-login
#
# User identity headers (X-User-Name, X-User-Subject, X-User-Groups) are injected
# by the header mutator for upstream services.
# Fine-grained RBAC is handled separately by workspace nginx.
# Traefik routes workspace paths to the Oathkeeper proxy port (4455).

serve:
  proxy:
    port: 4455
    host: "0.0.0.0"
  api:
    port: 4456
    host: "0.0.0.0"

access_rules:
  matching_strategy: regexp
  repositories:
    - file:///tmp/access-rules.yml

log:
  level: info
  format: json

errors:
  # All errors redirect to the login-relay. For unauthorized/not_found this
  # initiates a Keycloak PKCE flow. For forbidden (wrong-user workspace access),
  # the login-relay detects the mismatch via the dtaas_access_token cookie and
  # returns 403 directly, breaking what would otherwise be a redirect loop.
  fallback:
    - redirect
  handlers:
    redirect:
      enabled: true
      config:
        to: "${LOGIN_RELAY_URL}"
        # Append the original request URL as ?return_to=<url> so the login-relay
        # can redirect the user back to their workspace after Keycloak login.
        return_to_query_param: return_to
    json:
      enabled: true
      config:
        verbose: false

authenticators:
  noop:
    enabled: true

  oauth2_introspection:
    enabled: true
    config:
      introspection_url: "${KEYCLOAK_INTROSPECTION_URL}"
      # Keycloak's introspection endpoint requires HTTP Basic authentication
      # (client_id:client_secret). The base64-encoded credential is computed
      # in the compose entrypoint script and injected here at startup.
      introspection_request_headers:
        Authorization: "Basic ${KEYCLOAK_INTROSPECTION_BASIC_AUTH}"

authorizers:
  allow:
    enabled: true

  deny:
    enabled: true

  remote_json:
    enabled: true
    config:
      # Global defaults required by the Oathkeeper v26 schema when remote_json
      # is enabled. Per-rule config in access-rules.yml overrides remote with
      # the user-specific URL (http://login-relay:8080/authz/workspace/<user>).
      remote: http://login-relay:8080/authz/workspace/default
      payload: '{"subject":{"id":{{ .Subject | toJson }},"extra":{{ .Extra | toJson }}}}'

mutators:
  noop:
    enabled: true

  header:
    enabled: true
    config:
      headers:
        X-User-Name: "{{ print .Extra.username }}"
        X-User-Subject: "{{ .Subject }}"
        X-User-Groups: "{{ .Extra.groups | toJson }}"

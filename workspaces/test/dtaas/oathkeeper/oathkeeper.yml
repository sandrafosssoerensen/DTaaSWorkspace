# ORY Oathkeeper configuration for DTaaS workspace enforcement.
# Traefik ForwardAuth calls the decision API at http://oathkeeper:4456/decisions.

serve:
  proxy:
    port: 4455
    host: "0.0.0.0"
  api:
    port: 4456
    host: "0.0.0.0"

access_rules:
  matching_strategy: regexp
  repositories:
    - file:///tmp/access-rules.yml

log:
  level: info
  format: json

errors:
  fallback:
    - json
  handlers:
    json:
      enabled: true
      config:
        verbose: true

authenticators:
  noop:
    enabled: true

  jwt:
    enabled: true
    config:
      jwks_urls:
        - ${KEYCLOAK_JWKS_URL}
      trusted_issuers:
        - ${KEYCLOAK_ISSUER_URL}
      allowed_algorithms:
        - RS256
        - RS384
        - RS512
      token_from:
        cookie: dtaas_access_token
      # scope_strategy is set to none because the DTaaS PKCE client does not
      # request a specific OAuth scope for workspace access — authorization is
      # enforced by OPA RBAC (groups claim) and audience validation instead.
      # Set to 'exact' and configure required_scope if scopes are introduced.
      scope_strategy: none
      target_audience:
        - ${KEYCLOAK_TARGET_AUDIENCE}

authorizers:
  allow:
    enabled: true

  remote_json:
    enabled: true
    config:
      # OPA v0 API: returns HTTP 200 for allow, HTTP 404 for deny.
      # Oathkeeper's remote_json authorizer returns ErrForbidden (403) only when
      # the remote endpoint returns 403; any other non-200 becomes a 500.
      # opa-proxy is a nginx adapter that converts OPA's 404 deny response to 403
      # so Oathkeeper takes the correct ErrForbidden path.
      # NOTE: v0 API takes the raw input document — do NOT wrap in {"input": ...}.
      remote: http://opa-proxy:8080/v0/data/workspace/authz/allow
      payload: |
        {
          "subject": "{{ .Subject }}",
          "extra": {{ .Extra | toJson }},
          "url": {"path": "{{ .MatchContext.URL.Path }}"},
          "method": "{{ .MatchContext.Method }}"
        }
      forward_response_headers_to_upstream: []
      retry:
        give_up_after: 1s
        max_delay: 100ms

  deny:
    enabled: true

mutators:
  noop:
    enabled: true

  header:
    enabled: true
    config:
      headers:
        X-User-Name: "{{ print .Extra.preferred_username }}"
        X-User-Subject: "{{ .Subject }}"
        X-User-Groups: "{{ .Extra.groups | toJson }}"

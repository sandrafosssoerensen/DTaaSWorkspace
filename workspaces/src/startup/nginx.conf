error_log /home/{MAIN_USER}/.nginx/logs/error.log warn;
pid /home/{MAIN_USER}/.nginx/logs/nginx.pid;

events {}

http {
    upstream jupyter {
        server 127.0.0.1:{JUPYTER_SERVER_PORT} fail_timeout=0;
    }

    upstream vscode {
        server 127.0.0.1:{CODE_SERVER_PORT};
    }

    upstream vnc {
        server 127.0.0.1:{VNC_PORT};
    }

    upstream admin {
        server 127.0.0.1:{ADMIN_SERVER_PORT};
    }

    server {
        access_log /home/{MAIN_USER}/.nginx/logs/access.log;
        client_body_temp_path /home/{MAIN_USER}/.nginx/temp/client_body;
        fastcgi_temp_path /home/{MAIN_USER}/.nginx/temp/fastcgi;
        proxy_temp_path /home/{MAIN_USER}/.nginx/temp/proxy;
        scgi_temp_path /home/{MAIN_USER}/.nginx/temp/scgi;
        uwsgi_temp_path /home/{MAIN_USER}/.nginx/temp/uwsgi;

        listen 8080;

        absolute_redirect off;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering off;
            proxy_pass http://jupyter;
        }

        location = /ping {
            auth_basic off;
            return 200;
        }

        location ~* "^{WORKSPACE_BASE_URL_DECODED}/services" {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://admin;
        }

        # if base path is not in request url -> always redirect to base path
        location ~* "^(?!{WORKSPACE_BASE_URL_DECODED}).*$" {
            auth_basic off;
            return 302 {WORKSPACE_BASE_URL_ENCODED}$request_uri;
        }

        location ~* "^{WORKSPACE_BASE_URL_DECODED}/tools/vscode(?<remaining_part>.*)" {
            if ($remaining_part !~ ^/(.*)$) {
                set $remaining_part /$remaining_part;
            }

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # code-server forbids websocket access if the Origin doesn't match code-servers location.
            # easiest fix is to remove the header.
            proxy_set_header Origin "";

            proxy_redirect ~^\./(.*)  {WORKSPACE_BASE_URL_DECODED}/tools/vscode/$1;
            proxy_pass http://vscode$remaining_part$is_args$args;
        }

        # KasmVNC static assets referenced as ../assets/ relative to the vnc page.
        # The browser resolves these to /{user}/tools/assets/; proxy them to KasmVNC.
        location ~* "^{WORKSPACE_BASE_URL_DECODED}/tools/assets(?<remaining_part>.*)" {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8080;
            proxy_buffering off;

            proxy_pass https://vnc/assets$remaining_part$is_args$args;
        }

        # --- VNC ---
        # VNC proxy passing is split into two blocks.
        # One is for trying to access the base VNC path.
        # This adds the path argument if it is missing (by redirecting), or
        # passes the request on to the VNC server.
        location ~* "^{WORKSPACE_BASE_URL_DECODED}/tools/vnc/?$" {
            if ($arg_path = "") {
               return 302 {WORKSPACE_BASE_URL_DECODED}/tools/vnc/?path={MAIN_USER}%2Ftools%2Fvnc%2Fwebsockify;
            }

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8080;

            proxy_http_version 1.1;
            proxy_connect_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_buffering off;

            proxy_pass https://vnc/$is_args$args;
        }

        # One is for all subpaths, where we don't want to check if the path
        # argument is present.
        location ~* "^{WORKSPACE_BASE_URL_DECODED}/tools/vnc(?<remaining_part>.*)" {
            if ($remaining_part !~ ^/(.*)$) {
                set $remaining_part /$remaining_part;
            }

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8080;

            proxy_http_version 1.1;
            proxy_connect_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_buffering off;

            proxy_pass https://vnc$remaining_part$is_args$args;
        }
    }
}

name: Publish Workspace Docker Image

on:
  workflow_run:
    workflows:
      # the workflow names must match exactly with those in the required workflow files
      - "Dockerfile Lint"
      - "Lint Scripts"
      - "Test All Compose Files"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the image (e.g., 0.1.0)'
        required: false
        default: 'latest'

permissions:
  contents: read

jobs:
  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      actions: read
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Check all prerequisite workflows
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the SHA from the triggering workflow
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"

          echo "🔍 Checking all prerequisite workflows for SHA: $SHA"

          # Define required workflows
          # the workflow names must match exactly with those in the required workflow files
          WORKFLOWS=("Dockerfile Lint" "Lint Scripts" "Test All Compose Files")
          ALL_SUCCESS=true

          for workflow in "${WORKFLOWS[@]}"; do
            echo "Checking: $workflow"

            # Get the latest run for this workflow on the given SHA
            STATUS=$(gh api \
              "/repos/$REPO/actions/workflows" \
              --jq ".workflows[] | select(.name==\"$workflow\") | .id" \
              | head -1 | xargs -I {} gh api \
              "/repos/$REPO/actions/workflows/{}/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "not_found"')

            echo "  Status: $STATUS"

            if [ "$STATUS" != "success" ]; then
              echo "  ❌ $workflow has not succeeded (status: $STATUS)"
              ALL_SUCCESS=false
            else
              echo "  ✅ $workflow succeeded"
            fi
          done

          if [ "$ALL_SUCCESS" = true ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "✅ All prerequisite workflows succeeded"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "❌ Not all prerequisites met - skipping publish"
          fi

  publish-ghcr:
    name: Publish to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should_publish == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push multi-platform image to GHCR
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.xfce
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-dockerhub:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should_publish == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ secrets.DOCKERHUB_SCOPE }}/workspace
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push multi-platform image to Docker Hub
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.xfce
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-published-images:
    name: Test Published Images
    needs: [publish-ghcr, publish-dockerhub]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        registry:
          - name: ghcr
            image: ghcr.io/${{ github.repository }}
          - name: dockerhub
            image: IMAGE_NAME_DEFINED_AT_RUNTIME
        platform: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Log in to registry
        if: matrix.registry.name == 'ghcr'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          IMAGE="${{ matrix.registry.image }}"

          # Convert repository name to lowercase for GHCR compatibility
          if [[ "${{ matrix.registry.name }}" == "ghcr" ]]; then
            IMAGE="${IMAGE@L}"  # Bash 4+ lowercase expansion
          fi

          # Use DOCKERHUB_SCOPE secret for Docker Hub images
          if [[ "${{ matrix.registry.name }}" == "dockerhub" ]]; then
            IMAGE="${{ secrets.DOCKERHUB_SCOPE }}/workspace"
          fi

          echo "📥 Pulling image: ${IMAGE}:latest"
          docker pull "${IMAGE}:latest"
          docker tag "${IMAGE}:latest" workspace:latest
          docker images workspace:latest

      - name: Start Traefik and workspace services
        run: |
          docker compose -f workspaces/test/dtaas/compose.traefik.yml up -d

      - name: Check service health
        run: |
          echo "📊 Checking service status..."
          max_attempts=10
          attempt=0
          time_between_attempts=10
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            printf "\nAttempt $attempt out of $max_attempts\n"

            docker compose -f workspaces/test/dtaas/compose.traefik.yml ps
            echo "---"
            SERVICES=$(docker compose -f workspaces/test/dtaas/compose.traefik.yml ps --format json)
            if echo "$SERVICES" | head -1 | grep -q '^\['; then
              # JSON array format
              FAILED=$(echo "$SERVICES" | jq -r '.[] | select(.State != "running") | .Name')
            else
              # Newline-delimited JSON format
              FAILED=$(echo "$SERVICES" | jq -r 'select(.State != "running") | .Name')
            fi

            if [ ! -n "$FAILED" ]; then
              echo "✅ All services are running"
              break
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Some services did not start running within $(( (max_attempts - 1) * time_between_attempts )) seconds:"
              echo "$FAILED"
              exit 1
            fi

            echo "⏳ Some services are not yet running:"
            echo "$FAILED"
            echo "Trying again in $time_between_attempts seconds"
            sleep $time_between_attempts
          done

      - name: Test workspace routing through Traefik
        run: |
          echo "Testing workspace accessibility through Traefik..."
          max_attempts=10
          attempt=0
          time_between_attempts=10
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            printf "\nAttempt $attempt out of $max_attempts\n"

            response=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost/user1/services 2>/dev/null)

            if [ "$response" = "200" ]; then
              echo "✅ Workspace routing works (HTTP $response)"
              echo "Content of user1/services:"
              # We expect a json formatted document
              curl -s http://localhost/user1/services | json_pp -json_opt pretty,canonical
              break
            fi

            echo "Got unexpected HTTP response: $response"

            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Workspace not fully accessible within $(( (max_attempts - 1) * time_between_attempts )) seconds"
              exit 1
            fi

            echo "⏳ trying again in $time_between_attempts seconds"
            sleep $time_between_attempts
          done

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "TEST FAILED - PRINTING DOCKER COMPOSE DIAGNOSTICS:"
          echo ""
          echo "========================================"
          echo "|           Services Status            |"
          echo "========================================"
          docker compose -f workspaces/test/dtaas/compose.traefik.yml ps
          echo ""
          echo "========================================"
          echo "|             Traefik Logs             |"
          echo "========================================"
          docker compose \
            -f workspaces/test/dtaas/compose.traefik.yml \
            logs traefik
          echo ""
          echo "========================================"
          echo "|            Workspace Logs            |"
          echo "========================================"
          docker compose -f workspaces/test/dtaas/compose.traefik.yml \
            logs user1

      - name: Cleanup
        if: always()
        run: |
          docker compose -f workspaces/test/dtaas/compose.traefik.yml down -v
          docker system prune -f

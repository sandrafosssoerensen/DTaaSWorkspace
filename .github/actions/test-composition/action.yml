name: Test Composition
description: Test the composition in a CI environment
inputs:
  compose_file:
    description: Path to the docker compose file to test
    required: true
  platform:
    description: Target platform for testing (e.g. "linux/amd64", "linux/arm64")
    required: false
    default: "linux/amd64"
  startup_timeout:
    description: Time in seconds to wait for services to start before checking health
    required: false
    default: 0
  connectivity_endpoint:
    description: URL to check for service connectivity (e.g. "http://localhost/auth")
    required: false
    default: "http://localhost/user1/services"
  connectivity_expected_response_code:
    description: Expected HTTP response code for connectivity check (e.g. "200", "302")
    required: false
    default: "200"
  use_env_file:
    description: Whether to use an .env file for environment variables in docker compose (true/false)
    required: false
    default: false
  basic_test:
    description: Whether the test is a basic composition test without traefik (true/false)
    required: false
    default: false
  dex_test:
    description: Whether to run the Dex authentication test (true/false)
    required: false
    default: false
  tls_test:
    description: Whether to run the TLS test (true/false)
    required: false
    default: false
  no_forward_auth_service:
    description: Whether the composition has a forward-auth service (true/false)
    required: false
    default: false
  ignore_health_of_services:
    description: Comma-separated list of service names to ignore in health check (e.g. "service1,service2")
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up QEMU for multi-platform builds
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build workspace image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./workspaces
        file: workspaces/Dockerfile.ubuntu.noble.xfce
        build-args: INSTALLATION=minimal
        push: false
        load: true
        platforms: ${{ inputs.platform }}
        tags: workspace:latest
        cache-from: |
          type=gha,scope=${{ inputs.platform }}

    - name: Set compose environement args
      shell: bash
      run: |
        if [ "${{ inputs.use_env_file }}" = "true" ]; then
          ENV_FILE_ARG="--env-file workspaces/test/dtaas/config/.env"
        else
          ENV_FILE_ARG=""
        fi
        echo "ENV_FILE_ARG=$ENV_FILE_ARG" >> $GITHUB_ENV

    - name: Install mkcert and generate TLS certificates
      if: ${{ inputs.tls_test == 'true' }} && ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: |
        set -e
        ARCH=$(uname -m)
        case "${ARCH}" in
          x86_64)  MKCERT_ARCH="linux-amd64" ;;
          aarch64) MKCERT_ARCH="linux-arm64" ;;
          *)        echo "Unsupported architecture: ${ARCH}"; exit 1 ;;
        esac
        MKCERT_VERSION="v1.4.4"
        MKCERT_URL="https://github.com/FiloSottile/mkcert/releases/download"
        curl -fsSL \
          "${MKCERT_URL}/${MKCERT_VERSION}/mkcert-${MKCERT_VERSION}-${MKCERT_ARCH}" \
          -o /tmp/mkcert
        chmod +x /tmp/mkcert
        sudo mv /tmp/mkcert /usr/local/bin/mkcert

        mkcert -install

        mkcert \
          -cert-file workspaces/test/dtaas/ci/certs/fullchain.pem \
          -key-file  workspaces/test/dtaas/ci/certs/privkey.pem \
          localhost 127.0.0.1 ::1
        chmod 644 workspaces/test/dtaas/ci/certs/fullchain.pem
        chmod 600 workspaces/test/dtaas/ci/certs/privkey.pem
        echo "TLS certificates generated"

        CAROOT=$(mkcert -CAROOT)
        cp "${CAROOT}/rootCA.pem" workspaces/test/dtaas/ci/certs/rootCA.crt

        docker build \
          -t traefik-forward-auth-local:latest \
          workspaces/test/dtaas/ci/certs/
        echo "traefik-forward-auth-local image built"

    - name: Add Dex hostname to /etc/hosts
      if: ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: echo "127.0.0.1 dex" | sudo tee -a /etc/hosts

    - name: Generate self-signed certificates for testing
      if: ${{ inputs.tls_test == 'true' }} && ${{ inputs.dex_test == 'false' }}
      shell: bash
      run: |
          mkdir -p workspaces/test/dtaas/certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout workspaces/test/dtaas/certs/privkey.pem \
            -out workspaces/test/dtaas/certs/fullchain.pem \
            -subj "/C=US/ST=Test/L=Test/O=Test/CN=localhost"
          chmod 644 workspaces/test/dtaas/certs/fullchain.pem
          chmod 600 workspaces/test/dtaas/certs/privkey.pem
          echo "✅ Self-signed certificates generated"

    - name: Verify TLS configuration file
      if: ${{ inputs.tls_test == 'true' }} && ${{ inputs.dex_test == 'false' }}
      shell: bash
      run: |
        if [ -f workspaces/test/dtaas/dynamic/tls.yml ]; then
          echo "✅ TLS configuration file exists"
          cat workspaces/test/dtaas/dynamic/tls.yml
        else
          echo "❌ TLS configuration file not found"
          exit 1
        fi

    - name: Create DTaaS configuration files
      if: ${{ inputs.use_env_file == 'true' }}
      shell: bash
      run: |
        set -e
        cp ./workspaces/test/dtaas/config/.env.example ./workspaces/test/dtaas/config/.env
        if [ "${{ inputs.tls_test }}" = "true" ]; then
          sed -i 's/yourdomain.com/localhost/g' ./workspaces/test/dtaas/config/.env
        fi
        cp ./workspaces/test/dtaas/config/conf.example ./workspaces/test/dtaas/config/conf
        cp ./workspaces/test/dtaas/config/client.js.example ./workspaces/test/dtaas/config/client.js

    - name: Start services
      shell: bash
      run: |
        docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG up -d
        sleep ${{ inputs.startup_timeout }}

    - name: Check service health
      uses: ./.github/actions/check-service-health
      with:
        compose_file: ${{ inputs.compose_file }}
        use_env_file: ${{ inputs.use_env_file }}
        ignore_services: ${{ inputs.ignore_health_of_services }}

    - name: Test service endpoint
      if: ${{ inputs.dex_test == 'false' }}
      uses: ./.github/actions/check-connectivity
      with:
        url: ${{ inputs.connectivity_endpoint }}
        expected_response_code: ${{ inputs.connectivity_expected_response_code }}

    - name: Verify auth is enforced (expect redirect, not 200)
      if: ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: |
        echo "Verifying that unauthenticated requests are redirected..."
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-redirs 0 http://localhost/user1/ 2>/dev/null \
          || echo "000")
        echo "Unauthenticated response code: $response"
        if [ "$response" = "301" ] || [ "$response" = "302" ] || [ "$response" = "307" ]; then
          echo "✅ Auth middleware is active (unauthenticated -> redirect)"
        else
          echo "❌ Expected 301/302/307 redirect but got $response"
          exit 1
        fi

    - name: Test automated OAuth2 login via Dex (user1)
      if: ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: |
        pip install --quiet requests
        python3 workspaces/test/dtaas/ci/scripts/ci_auth_login.py \
          http://localhost user1 http://dex:5556 password

    - name: Test HTTP to HTTPS redirect
      if: ${{ inputs.tls_test == 'true' }}
      shell: bash
      run: |
        echo "Testing HTTP to HTTPS redirect..."
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-redirs 0 http://localhost/ 2>/dev/null \
          || echo "000")
        if [ "$response" = "301" ] || [ "$response" = "308" ]; then
          echo "✅ HTTP to HTTPS redirect is working (HTTP $response)"
        else
          echo "⚠️ Unexpected redirect behavior (HTTP $response)"
          echo "This might be expected if Traefik is still initializing"
        fi

    - name: Verify TLS certificate is loaded
      if: ${{ inputs.tls_test == 'true' }} && ${{ inputs.dex_test == 'false' }}
      shell: bash
      run: |
        echo "Checking Traefik logs for TLS certificate loading..."
        docker compose \
          -f ${{ inputs.compose_file }} \
          $ENV_FILE_ARG \
          logs traefik \
          | grep -i "certificate" || echo "No certificate messages in logs"

    - name: Show service logs on failure
      if: failure()
      shell: bash
      run: |
        if [ "${{ inputs.basic_test }}" = "true" ]; then
          WORKSPACE_SERVICE_NAME="workspace"
        else
          WORKSPACE_SERVICE_NAME="user1"
        fi
        echo "TEST FAILED - PRINTING DIAGNOSTICS:"
        echo ""
        echo "========================================"
        echo "|           Services Status            |"
        echo "========================================"
        docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG ps
        echo ""
        if [ "${{ inputs.basic_test }}" = "false" ]; then
          echo "========================================"
          echo "|             Traefik Logs             |"
          echo "========================================"
          docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG \
            logs traefik
          echo ""
        fi
        if [ "${{ inputs.basic_test }}" = "false" ] && [ "${{ inputs.no_forward_auth_service }}" = "false" ]; then
          echo "========================================"
          echo "|      Traefik Forward Auth Logs       |"
          echo "========================================"
          docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG \
            logs traefik-forward-auth
          echo ""
        fi
        if [ "${{ inputs.dex_test }}" = "true" ]; then
          echo "========================================"
          echo "|       Dex Authentication Logs        |"
          echo "========================================"
          docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG \
            logs dex
          echo ""
        fi
        echo "========================================"
        echo "|            Workspace Logs            |"
        echo "========================================"
        docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG \
          logs $WORKSPACE_SERVICE_NAME

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        docker compose -f ${{ inputs.compose_file }} $ENV_FILE_ARG down -v
        docker system prune -f
        if [ "${{ inputs.tls_test }}" = "true" ]; then
          rm -f workspaces/test/dtaas/ci/certs/fullchain.pem \
                  workspaces/test/dtaas/ci/certs/privkey.pem \
                  workspaces/test/dtaas/ci/certs/rootCA.crt
        fi
